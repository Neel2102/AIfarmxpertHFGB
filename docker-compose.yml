# ============================================================
# FarmXpert — Docker Compose (Enterprise Edition)
# ============================================================
# Services:
#   1. PostgreSQL 16 + pgvector (primary DB)
#   2. PgBouncer (connection pooling)
#   3. Redis (Caching)
#   4. FastAPI Backend (port 8000)
#   5. React Frontend (port 3000)
# ============================================================

version: '3.8'

networks:
  farmxpert-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

services:
  # ────────────────────────────────────────────
  # PostgreSQL 16 + pgvector (Primary Database)
  # ────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: farmxpert_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farmxpert
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"       # direct PG access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/farmxpert/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/farmxpert/database/create_partitions.sql:/docker-entrypoint-initdb.d/02_partitions.sql
      - ./backend/farmxpert/database/seed_agents.sql:/docker-entrypoint-initdb.d/03_seed.sql
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=512MB
        -c max_connections=200
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c password_encryption=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmxpert"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmxpert-network

  # ────────────────────────────────────────────
  # PgBouncer (Connection Pooling)
  # ────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: farmxpert_pgbouncer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://postgres:password@db:5432/farmxpert"
      AUTH_TYPE: md5
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 100
      SERVER_RESET_QUERY: "DISCARD ALL"
      SERVER_CHECK_QUERY: "SELECT 1"
      SERVER_CHECK_DELAY: 10
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_POOLER_ERRORS: 1
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmxpert-network

  # ────────────────────────────────────────────
  # Redis (Caching & Session Storage)
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: farmxpert_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - farmxpert-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # FastAPI Backend
  # ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmxpert_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@pgbouncer:5432/farmxpert
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - farmxpert-network
    volumes:
      - ./backend/farmxpert:/app/farmxpert
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - /app/__pycache__
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["uvicorn", "farmxpert.app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  # ────────────────────────────────────────────
  # React Frontend
  # ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: farmxpert_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=https://6c415e8983d35ff1-157-49-127-200.serveousercontent.com
    networks:
      - farmxpert-network
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
